name: Daily Android Build APK for Firebase

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC
  workflow_dispatch:
  push:
    branches: [ feature/firebase-distribution-action ]

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      # ----------------- CHECKOUT -----------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------- JAVA -----------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # ----------------- VERSIONING -----------------
      - name: Bump versionCode
        run: |
          FILE=composeApp/build.gradle.kts
          CODE=$(grep "versionCode" $FILE | sed 's/[^0-9]*//g')
          NEW=$((CODE+1))
          sed -i "s/versionCode = $CODE/versionCode = $NEW/" $FILE
          echo "New versionCode: $NEW"

      - name: Set versionName with date and time
        run: |
          FILE=composeApp/build.gradle.kts
          DATETIME=$(date +%Y%m%d-%H%M)
          sed -i "s/versionName = \".*\"/versionName = \"0.1.0-$DATETIME\"/" $FILE
          echo "versionName set to 0.1.0-$DATETIME"

      # ----------------- KEYSTORE -----------------
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Check Keystore exists
        run: |
          if [ ! -f keystore.jks ]; then
            echo "Keystore not found!"
            exit 1
          fi
          ls -lh keystore.jks

      # ----------------- BUILD APK -----------------
      - name: Build Release APK
        run: ./gradlew :composeApp:assembleRelease

      - name: Check APK exists
        run: |
          APK_PATH=$(find composeApp/build/outputs -name "*release.apk")
          echo "Found APK at $APK_PATH"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: APK not found!"
            exit 1
          fi

      # ----------------- FIREBASE UPLOAD -----------------
      - name: Upload APK to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: beta-testers
          file: ${{ steps.check-apk.outputs.APK_PATH || 'composeApp/build/outputs/apk/release/composeApp-release.apk' }}